<!DOCTYPE html>
<html>
  <head>
    <style type="text/css">
      body {
        background-color: #ffffff;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        font-family: Arial, sans-serif;
        box-shadow: 0 0 10px 5px rgba(0, 0, 0, 0.1);
        padding: 20px;
        background-color: #f9f9f9;
        border: 1px solid #eee;
        border-radius: 5px;
      }
      .header {
        color: #2c3e50;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
      }

      .code {
        font-size: 24px;
        font-weight: bold;
        color: #3498db;
        margin: 20px 0;
        display: inline-block;
        padding: 10px;
        background-color: #ecf0f1;
        border-radius: 5px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1), 0 1px 3px rgba(0, 0, 0, 0.06); /* Underlay effect */
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2); /* Subtle text shadow */
      }
      .footer {
        font-size: 12px;
        color: #7f8c8d;
        margin-top: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 class="header">Reset Token</h2>
      <p>
        We received a request for a reset token. Please use the reset token
        below to proceed:
      </p>
      <p class="code">{{reset_token}}</p>
      <p>
        If you did not request a reset token, please ignore this message or
        contact support.
      </p>
    </div>
    <div class="footer">
      <p>This is an automated message. Please do not reply.</p>
    </div>
  </body>
</html>
