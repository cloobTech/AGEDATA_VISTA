version: "3.9"

services:
  api:
    build: .
    container_name: age_vista_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn api.v1.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

    develop:
      watch:
        # Sync your project directory into /app in the container
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - .git/
            - uv-cache/

        # Rebuild image if dependencies change
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock

  db:
    image: postgres:15
    container_name: age_vista_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uv-cache:
  static_files:
    driver: local
